services:
  api:
    build: ./api
    ports:
      - "3001:3001"
    volumes:
      - kanban-data:/data
    environment:
      - DB_PATH=/data/kanban.db
      - LITELLM_URL=http://host.docker.internal:4000
      - LITELLM_API_KEY=${LITELLM_API_KEY}
      - AI_MODEL=${AI_MODEL:-gpt-5}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  kanban-data:
